name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,pandas]"
      - name: Run tests with coverage
        run: pytest tests/ -v --cov=excel_dbapi --cov-report=xml --cov-report=term-missing
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v6
        with:
          files: coverage.xml
          fail_ci_if_error: false
      - name: Run ruff
        run: ruff check src/ examples/
      - name: Run ruff format check
        run: ruff format --check src/ examples/
      - name: Run mypy strict
        run: mypy --strict src/

  packaging-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build wheel and sdist artifacts
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build
          python -m build --sdist
      - name: Validate package metadata
        run: |
          python -m pip install twine
          twine check dist/*
      - name: Smoke test wheel install in clean venv
        run: |
          python -m venv .venv-wheel
          .venv-wheel/bin/python -m pip install --upgrade pip
          .venv-wheel/bin/python -m pip install dist/*.whl
          .venv-wheel/bin/python -m pip install "excel-dbapi[pandas,graph]"
          .venv-wheel/bin/python -c "import excel_dbapi; print(excel_dbapi.__version__)"
          .venv-wheel/bin/python -c "from importlib.metadata import metadata; m=metadata('excel-dbapi'); assert m['Name'] == 'excel-dbapi'; assert m['Version']"
          .venv-wheel/bin/excel-dbapi --help
          .venv-wheel/bin/python -c "import pandas; print('pandas extra OK')"
          .venv-wheel/bin/python -c "import httpx; print('graph extra OK')"
      - name: Smoke test sdist install in clean venv
        run: |
          python -m venv .venv-sdist
          .venv-sdist/bin/python -m pip install --upgrade pip
          .venv-sdist/bin/python -m pip install dist/*.tar.gz
          .venv-sdist/bin/python -c "import excel_dbapi; print(excel_dbapi.__version__)"
          .venv-sdist/bin/python -c "from importlib.metadata import metadata; m=metadata('excel-dbapi'); assert m['Name'] == 'excel-dbapi'; assert m['Version']"
          .venv-sdist/bin/excel-dbapi --help
