repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.6
    hooks:
      - id: ruff-format
      - id: ruff
        args: ["--fix"]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        language: python
        files: "^src/"
        pass_filenames: false
        args:
          [
            "--config-file=pyproject.toml",
            "--install-types",
            "--non-interactive"
          ]
