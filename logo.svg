<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1DB954"/>
      <stop offset="100%" stop-color="#148A40"/>
    </linearGradient>
  </defs>

  <!-- Base -->
  <rect x="8" y="8" width="112" height="112" rx="26" fill="url(#bg)"/>

  <!-- 2×2 grid -->
  <rect x="25" y="25" width="34" height="30" rx="6" fill="#fff" opacity="0.95"/>
  <rect x="64" y="25" width="34" height="30" rx="6" fill="#fff" opacity="0.80"/>
  <rect x="25" y="60" width="34" height="30" rx="6" fill="#fff" opacity="0.80"/>
  <rect x="64" y="60" width="34" height="30" rx="6" fill="#fff" opacity="0.60"/>

  <!-- DB hint: ">_" prompt in bottom-right cell -->
  <path d="M69 69 L77 75 L69 81" fill="none" stroke="url(#bg)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.75"/>
  <line x1="80" y1="81" x2="92" y2="81" stroke="url(#bg)" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>
</svg>
